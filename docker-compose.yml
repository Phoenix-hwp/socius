version: "3.8"

services:
  # 本地 Ollama 模型服务
  ollama:
    image: ollama/ollama:latest
    container_name: socius-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve

  # Socius 框架 — 独立运行
  socius:
    build: .
    container_name: socius-core
    depends_on:
      - ollama
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - SOCIUS_MODEL=ollama-local
      - OLLAMA_HOST=ollama  # Docker 内部 DNS
      # 云端模型 API Key（可选，不设置则只用本地 Ollama）
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # - KIMI_API_KEY=${KIMI_API_KEY}
    volumes:
      - ./core:/socius/core:ro
      - ./adapters:/socius/adapters:ro
      - socius_data:/socius/data
    command: verify

volumes:
  ollama_data:
  socius_data:
