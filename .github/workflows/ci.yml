name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check core/ adapters/ --ignore=E501

      - name: Syntax check (all Python files)
        run: |
          python -c "
          import ast, pathlib
          errors = []
          for f in pathlib.Path('core').rglob('*.py'):
              try: ast.parse(f.read_text())
              except Exception as e: errors.append(f'{f}: {e}')
          for f in pathlib.Path('adapters').rglob('*.py'):
              try: ast.parse(f.read_text())
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(e)
              raise SystemExit(1)
          print('All files passed syntax check')
          "

      - name: Adapter verification
        run: python scripts/verify_cursor_adapter.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Socius Self-Check (no API key required)
        run: python socius_cli.py verify
